<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="hero">

        <div class="panda_ear left_ear"></div>
        <div class="panda_ear right_ear"></div>
        <div class="panda_face">
            <div class="panda_eye left_eye">
                <div class="panda_left_eye_pupil"></div>
            </div>
            <div class="panda_eye right_eye">
                <div class="panda_right_eye_pupil"></div>
            </div>
            <div class="panda_cheecks left_cheeck"></div>
            <div class="panda_cheecks right_cheeck"></div>
            <div class="panda_nose"></div>
            <div class="panda_smile_left_part"></div>
            <div class="panda_smile_right_part"></div>
        </div>

        <div class="panda_hands left_hand"></div>
        <div class="panda_hands right_hand"></div>

        
        <div class="mainbody">
            <div class="username">
                <div class="username_icon"></div>
                <input type="text" name="username" id="username_box">
            </div>
            <div class="password">
                <div class="password_icon"></div>
                <input type="password" name="password" id="password_box">
            </div>
            <div class="login_button">
                <h1>Login</h1>
        </div>

        </div>
        <div class="pandalegs left_leg">
            <div class="leg_finger finger1"></div>
            <div class="leg_finger finger2"></div>
            <div class="leg_finger finger3"></div>
            <div class="legpaw"></div>
        </div>
        <div class="pandalegs right_leg">
            <div class="leg_finger finger1"></div>
            <div class="leg_finger finger2"></div>
            <div class="leg_finger finger3"></div>
            <div class="legpaw"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
