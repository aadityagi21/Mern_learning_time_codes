<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix India- Watch TV Shows Online, Watch Movies Online </title>
</head>
<body>
    <section class="hero">
        <section class="background">
            <img src="">
        </section>
        <header>
            <section class="logo"><img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8hV5BMf1bjQjJfVXUIEAkvljfW9ELi4kzIg&s">
            </section>
            <section class="navbar">
                <div class="lang">
                    <img src="netflix_lang.jpg">
                    <select name="language">
                        <option value="English">English</option>
                        <option value="Hindi">Hindi</option>
                        <option value="Korean">Korean</option>
                        <option value="Japanese">Japanese</option>
                    </select>
                </div>
                <div class="signin">
                    <button>Sign In</button>
                </div>
            </section>
        </header>

        <main>
            <section class="info">
                <h1>Unlimited movies, <br> shows, and more</h1>
                <h2>Starts at ₹149. Cancel at any time.</h2>
                <p>Ready to watch? Enter your email to create or restart your membership.</p>
            </section>
            <section class="signup">
                <input type="email" placeholder="Email address">
                <button>Get Started ></button>
            </section>
        </main>
    </section>
</body>
</html>
