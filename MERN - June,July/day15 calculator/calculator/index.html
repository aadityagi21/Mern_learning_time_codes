<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSrueINFRqSTPfXl-EuubwW1dAyDgA9QW22grdIccxcog&s=10" type="image/x-icon">
    <title>Calculator</title>
</head>

<body>
    <div class="hero">
        <div class="main">
            <div class="display">
                <input type="text">
            </div>
            <div class="buttons">
                <button class="button num">CE</button>
                <button class="button num">AC</button>
                <button class="button equal">=</button>
                <button class="button num">+</button>
                <button class="button num">1</button>
                <button class="button num">2</button>
                <button class="button oper">3</button>
                <button class="button oper">-</button>
                <button class="button num">4</button>   
                <button class="button num">5</button>
                <button class="button num">6</button>
                <button class="button oper">*</button>
                <button class="button num">7</button>
                <button class="button num">8</button>
                <button class="button num">9</button>
                <button class="button oper">/</button>
                <button class="button num">0</button>
                <button class="button num">.</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
